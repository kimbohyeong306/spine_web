<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>보형킴의 디지털 아뜨리움</title>

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@esotericsoftware/spine-player@4.2.*/dist/spine-player.css"
    />
    <script src="https://unpkg.com/@esotericsoftware/spine-player@4.2.*/dist/iife/spine-player.js"></script>
  </head>

  <body>
    <nav class="top-nav">
      <a href="index.html" class="active">SPINE</a>
      <a href="artwork.html" >ARTWORK</a>
    </nav>

    <div class="sidebar">
      <h2>SELECT SKIN</h2>
      <select
        class="skin-select"
        id="skin-selector"
        onchange="updateButtonList()"
      >
        <option value="skin1">👗 스킨 1</option>
        <option value="skin2">🧚 스킨 2</option>
      </select>
      <h2>ANIMATIONS</h2>
      <div id="anim-buttons"></div>
    </div>

    <div class="main-display">
      <h1>보형킴의 스파인 아뜨리움</h1>
      <p class="subtitle">보형킴의 스파인 애니메이션 포트폴리오입니다.</p>
      <div id="player-container"></div>
    </div>

    <script>
      let player = new spine.SpinePlayer("player-container", {
        jsonUrl: "assets/new_C1.json",
        atlasUrl: "assets/new_C1.atlas",
        showControls: true,
        premultipliedAlpha: true,
        alpha: true,
        backgroundColor: "#00000000",
        preserveDrawingBuffer: true,
        controlImages: true,

        success: function (p) {
          // [DEBUG] 나중에 배포할 때 아래 한 줄만 주석 처리하면 끝!
          debugSpineData(p);

          // 1. 텍스처 필터 보정
          if (p.atlas && p.atlas.pages) {
            p.atlas.pages.forEach((page) => {
              if (page.texture) {
                page.texture.setFilters(
                  spine.TextureFilter.Linear,
                  spine.TextureFilter.Linear,
                );
              }
            });
          }

          // 2. UI 버튼 생성
          if (typeof updateButtonList === "function") {
            updateButtonList();
          }

          // 3. 물리 엔진 초기화
          setTimeout(() => {
            // p.skeleton.updateWorldTransform();
            p.animationState.update(0);
            p.animationState.apply(p.skeleton);
            console.log("✅ 렌더링 준비 완료");
          }, 100);
        },
      });

      // --------------------------------------------------
      // [데이터 분석 전용 메서드]
      // --------------------------------------------------
      function debugSpineData(p) {
        console.group(
          "%c🔍 스파인 데이터 인스펙터",
          "color: #007acc; font-weight: bold;",
        );

        const allSkins = p.skeleton.data.skins.map((s) => s.name);
        const allAnims = p.skeleton.data.animations.map((a) => a.name);

        const skinMap = {};
        allSkins.forEach((skin) => {
          const matched = allAnims.filter((name) => name.includes(skin));
          skinMap[skin] = {
            Count: matched.length,
            List: matched.join(", ") || "(N/A)",
          };
        });

        console.log("👗 Skins:", allSkins);
        console.table(skinMap);
        console.groupEnd();
      }

      // --------------------------------------------------
      // 기존 UI 로직들 (수정 없음)
      // --------------------------------------------------
      function createDynamicButtons(animNames) {
        const selectedSkin = document.getElementById("skin-selector").value; // 이제 "skin1" 또는 "skin2"가 들어옴
        const buttonContainer = document.getElementById("anim-buttons");

        if (player.skeleton) {
          // 1. 에러 해결: "skin1"이라는 이름을 그대로 전달
          player.skeleton.setSkinByName(selectedSkin);
          player.skeleton.setSlotsToSetupPose();
        }

        // 2. 필터링 해결: 해당 스킨 이름으로 시작하는 애니메이션만 추출
        const filtered = animNames.filter((name) =>
          name.startsWith(selectedSkin),
        );

        // 만약 스킨 전용 애니메이션이 없으면 전체를 보여주는 예외 처리
        const targetList = filtered.length > 0 ? filtered : animNames;

        buttonContainer.innerHTML = targetList
          .map(
            (name) => `
          <button class="menu-btn" onclick="changeAnim('${name}')">
              🎬 ${
                name
                  .split("/")
                  .pop()
                  .replace(selectedSkin + "_", "")
                  .trim() || name
              }
          </button>
      `,
          )
          .join("");

        if (targetList.length > 0) changeAnim(targetList[0]);
      }

      function updateButtonList() {
        const realAnims = player.skeleton.data.animations.map((a) => a.name);
        createDynamicButtons(realAnims);
      }

      function changeAnim(name) {
        if (player.animationState) {
          try {
            player.animationState.setAnimation(0, name, true);
          } catch (e) {
            console.error("재생 실패: " + name);
          }
        }
      }
    </script>
  </body>
</html>
